name: Test no-spcomp-proxy option
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-sp
        uses: .
        with:
          version: '1.10.x'
          no-spcomp-proxy: 'true'
          github-token: ${{ github.token }}
      - name: Assert version output is set
        env:
          ACTUAL: ${{ steps.setup-sp.outputs.version }}
        run: |
          echo "actual version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version output is '$ACTUAL'"
      - name: Assert spcomp is available on PATH
        run: |
          which spcomp || (echo "FAIL: spcomp not found on PATH" && exit 1)
          echo "PASS: spcomp found at $(which spcomp)"
      - name: Assert spcomp runs without proxy
        run: |
          spcomp --version 2>&1 || true
          echo "PASS: spcomp executed without proxy"
